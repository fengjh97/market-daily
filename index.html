<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>市場日報 · Market Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;800&family=Zen+Kaku+Gothic+New:wght@400;500&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
.latest{display:block;text-decoration:none;color:var(--ink);
  background:linear-gradient(180deg,var(--panel),#101722);
  border:1px solid var(--line);border-radius:14px;
  padding:24px 24px 20px;margin-top:30px;position:relative;overflow:hidden;
  animation:rise .7s .12s cubic-bezier(.2,.8,.2,1) both;
  transition:border-color .25s, transform .25s}
.latest:hover{border-color:var(--gold);transform:translateY(-2px)}
.latest::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;
  background:linear-gradient(var(--up),var(--down))}
.latest .title{font-family:'Shippori Mincho B1',serif;font-weight:600;
  font-size:23px;margin:10px 0 6px}
.latest .meta{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--dim)}
.latest .go{position:absolute;right:22px;bottom:18px;font-family:'IBM Plex Mono',monospace;
  font-size:13px;color:var(--down);letter-spacing:.1em}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="candles" aria-hidden="true">
    <i class="c-u" style="height:16px"></i><i class="c-d" style="height:24px"></i>
    <i class="c-u" style="height:12px"></i><i class="c-u" style="height:28px"></i>
    <i class="c-d" style="height:20px"></i><i class="c-d" style="height:33px"></i>
    <i class="c-u" style="height:22px"></i>
  </div>
  <h1>市場日報<small>MARKET DAILY · TOKYO / SEOUL / NEW YORK</small></h1>
  <div class="rule"></div>
</header>

<a id="latest" class="latest" href="#">
  <span class="kicker">Latest Issue</span>
  <div class="title" id="latest-title">—</div>
  <div class="meta" id="latest-meta">loading…</div>
  <span class="go">READ →</span>
</a>

<h2 class="sec">Archive · 既刊</h2>
<div id="list"></div>

<footer>
  ☀ 早报 · ◐ 午盘 · ◆ 收盘 · ☾ 晚报 · ❖ 图表 |
  <span style="color:var(--up)">红=阳线</span> / <span style="color:var(--down)">青=阴线</span><br>
  automated research bulletin — not investment advice
</footer>
</div>

<script>
const TYPE = {morning:["早晨研报","morning"], midday:["午盘汇总","midday"],
              close:["收盘报道","close"], evening:["睡前研报","evening"]};
const WEEK = ["日","一","二","三","四","五","六"];
fetch("data/index.json?t=" + Date.now()).then(r => r.json()).then(idx => {
  const items = idx.items || [];
  if (items.length) {
    const it = items[0], [label] = TYPE[it.type] || [it.type];
    const href = it.kind === "charts"
      ? `charts.html?p=${it.date}/${it.file}` : `report.html?p=${it.date}/${it.type}`;
    document.getElementById("latest").href = href;
    document.getElementById("latest-title").textContent =
      it.kind === "charts" ? "图表端末" : label;
    document.getElementById("latest-meta").textContent = `${it.date} ${it.ts} JST`;
  }
  const byDay = {};
  items.forEach(it => (byDay[it.date] ||= []).push(it));
  let i = 0;
  document.getElementById("list").innerHTML = Object.entries(byDay).map(([day, list]) => {
    const w = WEEK[new Date(day).getDay()];
    const reports = list.filter(x => x.kind !== "charts");
    const charts  = list.filter(x => x.kind === "charts");
    let rows = reports.map(it => {
      const [label, cls] = TYPE[it.type] || [it.type, "close"];
      return `<li style="animation-delay:${.2 + (i++) * .04}s">
        <a href="report.html?p=${it.date}/${it.type}">
        <span class="t">${it.ts}</span><span class="dots"></span>
        <span class="tag ${cls}">${label}</span></a></li>`;
    }).join("");
    rows += charts.map(it =>
      `<li style="animation-delay:${.2 + (i++) * .04}s">
        <a href="charts.html?p=${it.date}/${it.file}">
        <span class="t">${it.ts}</span><span class="dots"></span>
        <span class="tag charts">图表端末 · ${it.scope}</span></a></li>`).join("");
    return `<div class="day">${day.replaceAll("-","·")}（${w}）</div><ul class="ledger">${rows}</ul>`;
  }).join("");
}).catch(() => document.getElementById("list").textContent = "— 暂无报告 —");
</script>
</body>
</html>
